name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      - run: npm test

      - run: node scripts/generate-buildinfo.mjs

      - run: npm run build

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Trigger website update
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          curl -fX POST \
            -H "Authorization: Bearer ${{ secrets.WEBSITE_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/meops/mail2dns-website/dispatches \
            -d "{\"event_type\":\"mail2dns-published\",\"client_payload\":{\"version\":\"${VERSION#v}\"}}"
